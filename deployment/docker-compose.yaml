name: voting-system

services:

  postgres:
    image: postgres:18
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: postgres
      POSTGRES_DB: voting_system_db
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5433:5432"
    networks:
      - app-network

  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  app-network:

volumes:
  postgres-data: